# Local dev dependencies for machines with Docker.
# (No Docker? `pnpm db:dev` runs an embedded Postgres instead.)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gamehub
      POSTGRES_PASSWORD: gamehub
      POSTGRES_DB: gamehub
    ports:
      - '5433:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata_dev:
