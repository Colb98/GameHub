# Production stack for a single VPS. Copy to ~/gamehub together with
# Caddyfile and a .env file (see .env.prod.example), then:
#   docker compose --env-file "$HOME/gamehub/.env" -f docker-compose.prod.yml up -d
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required in ~/gamehub/.env}
    volumes:
      # ':ro,z' — the z suffix lets Docker relabel this host bind mount for
      # SELinux (enforcing on CentOS); it's a harmless no-op on other distros.
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,z
      - games_storage:/srv/games:ro
      - caddy_data:/data
      - caddy_config:/config

  api:
    image: ${API_IMAGE:-ghcr.io/colb98/gamehub-api:latest}
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://gamehub:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in ~/gamehub/.env}@postgres:5432/gamehub
      WEB_ORIGIN: https://${DOMAIN:?DOMAIN is required in ~/gamehub/.env}
      GAMES_STORAGE_DIR: /storage/games
      COOKIE_SECURE: 'true'
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in ~/gamehub/.env}
      JWT_GUEST_SECRET: ${JWT_GUEST_SECRET:?JWT_GUEST_SECRET is required in ~/gamehub/.env}
      # OAuth callbacks use the same-origin API proxy so the resulting auth
      # cookies belong to the portal host as well.
      API_PUBLIC_URL: https://${DOMAIN:?DOMAIN is required in ~/gamehub/.env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
    volumes:
      - games_storage:/storage/games
    depends_on:
      - postgres

  web:
    image: ${WEB_IMAGE:-ghcr.io/colb98/gamehub-web:latest}
    restart: unless-stopped
    environment:
      # Server-side rendering talks to the API over the internal Docker
      # network. Browser calls use the portal's same-origin /api proxy.
      API_URL: http://api:4000/api/v1
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamehub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in ~/gamehub/.env}
      POSTGRES_DB: gamehub
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Reserved for rate-limit storage / leaderboards / multiplayer pub-sub
  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  pgdata:
  games_storage:
